name: sidecar-ci

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install WXT dependencies
        working-directory: extensions/wxt
        run: bun install --frozen-lockfile

      - name: Check WXT
        working-directory: extensions/wxt
        run: bun run check

      - name: Run unit tests
        working-directory: extensions/wxt
        run: bun run test:unit

      - name: Package WXT release artifacts
        working-directory: extensions/wxt
        run: bun run package:release

      - name: Install Playwright Chromium
        working-directory: extensions/wxt
        run: bunx playwright install --with-deps chromium

      - name: Run browser tests (parity + demo host)
        working-directory: extensions/wxt
        run: bun run test:e2e

      - name: Setup Node for website
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install website dependencies
        working-directory: web
        run: npm ci

      - name: Check website
        working-directory: web
        run: npm run check

      - name: Build website
        working-directory: web
        run: npm run build

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: sidecar-release-artifacts
          path: |
            extensions/wxt/release/manifest.json
            extensions/wxt/release/SHA256SUMS.txt
            extensions/wxt/release/artifacts/*.zip
